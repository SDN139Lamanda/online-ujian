<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExamShield — Ujian</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page active" id="page-exam">
  <header class="exam-header">
    <div>
      <div class="exam-title">Ujian Matematika</div>
      <div class="exam-info">Durasi: 90 menit</div>
    </div>
    <div class="exam-timer" id="exam-timer">90:00</div>
  </header>
  <div class="exam-body">
    <aside class="exam-nav">
      <div class="exam-nav-title">Nomor Soal</div>
      <div class="question-nums">
        <div class="q-num current">1</div>
        <div class="q-num">2</div>
        <div class="q-num">3</div>
      </div>
    </aside>
    <main class="exam-main">
      <div class="card">
        <div class="card-title">Soal 1</div>
        <p>Hasil dari 12 × 8 adalah...</p>
        <div class="form-group">
          <label>Jawaban</label>
          <input type="text" id="answer-1">
        </div>
      </div>
    </main>
  </div>
  <footer class="exam-footer">
    <button class="btn btn-success">Simpan Jawaban</button>
    <button class="btn btn-warn">Tandai Soal</button>
    <button class="btn btn-danger">Kumpulkan</button>
  </footer>
  <script src="js/exam.js"></script>
</body>
</html>
