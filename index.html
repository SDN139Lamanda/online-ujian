<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExamShield — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page active" id="page-login">
  <div class="login-container">
    <div class="login-brand">
      <div class="brand-icon">🛡️</div>
      <div class="brand-title">ExamShield</div>
      <div class="brand-sub">Sistem Ujian Online</div>
    </div>
    <div class="login-card">
      <div class="role-tabs">
        <button class="role-tab active">Admin</button>
        <button class="role-tab">Guru</button>
        <button class="role-tab">Siswa</button>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Login</button>
      </form>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
