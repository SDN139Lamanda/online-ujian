<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExamShield — Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page active" id="page-app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">ExamShield</div>
      <div class="sidebar-role">Admin</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Menu</div>
      <div class="nav-item active"><span class="nav-icon">🏠</span> Dashboard</div>
      <div class="nav-item"><span class="nav-icon">📊</span> Statistik</div>
      <div class="nav-item"><span class="nav-icon">📝</span> Ujian</div>
    </nav>
    <div class="sidebar-footer">
      <button class="btn btn-danger btn-sm">Logout</button>
    </div>
  </aside>
  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">Dashboard</h1>
      <p class="page-subtitle">Ringkasan aktivitas sistem ujian</p>
    </div>
    <div class="grid-3">
      <div class="stat-card blue">
        <div class="stat-value">120</div>
        <div class="stat-label">Jumlah Siswa</div>
      </div>
      <div class="stat-card green">
        <div class="stat-value">15</div>
        <div class="stat-label">Jumlah Guru</div>
      </div>
      <div class="stat-card yellow">
        <div class="stat-value">8</div>
        <div class="stat-label">Ujian Aktif</div>
      </div>
    </div>
  </main>
  <script src="js/dashboard.js"></script>
</body>
</html>
